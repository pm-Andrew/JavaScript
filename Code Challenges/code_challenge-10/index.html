<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Mood Board</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/normalize.css">

</head>

<body>
    <section class="container">
        <h2>Clark Student Mood Board</h2>
        <p>Being a student is time consuming. Here's a mood board with some sass.</p>

        <div class="mood-container">
            <h2>How are you feeling?</h2>
            <button id="button_1">🧟‍♂️</button>
            <button id="button_2">😃</button>
            <button id="button_3">🍕</button>
        </div>
    </section>
    <!-- Message Board that pops up on clicks -->
    <div class="message-board">
        <h2>Message Says</h2>
        <div id="message"></div>
    </div>

</body>
<script src="js/script.js"></script>

</html>
